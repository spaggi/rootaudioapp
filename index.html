<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Root Audio</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">

<!-- PWA / iOS home screen -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#241d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Root Audio">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32.png">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>

<main class="app">
  <img class="logo" src="logo.png" alt="Root – A Game of Woodland Might and Right">

  <section class="transport" aria-label="Wiedergabe-Steuerung">
    <button id="playPauseBtn" class="transport-btn" type="button" aria-label="Play/Pause">
      <svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20" /></svg>
      <svg id="pauseIcon" class="icon-hidden" viewBox="0 0 24 24"><rect x="5" y="4" width="5" height="16"/><rect x="14" y="4" width="5" height="16"/></svg>
    </button>
    <div id="nowPlaying" class="now-playing">Kein Titel ausgewählt</div>
  </section>

  <section class="theme-section" aria-label="Theme-Auswahl">
    <select id="themeSelect" class="theme-select">
      <option value="overworld" selected>Overworld</option>
      <option value="winter">Winter</option>
      <option value="lake">Lake</option>
      <option value="mountain">Mountain</option>
    </select>
    <button id="playThemeBtn" class="play-theme-btn" type="button">Play Theme</button>
  </section>

  <section class="icon-section" aria-label="Battle und Victory">
    <button id="battleBtn" class="icon-btn" type="button" aria-label="Battle Theme">
      <svg id="swordIcon" viewBox="0 0 24 24">
        <g transform="rotate(45 12 12)">
          <rect x="11" y="1" width="2" height="13" rx="1"/>
          <rect x="8" y="13" width="8" height="2" rx="1"/>
          <rect x="10.5" y="15" width="3" height="7" rx="1"/>
        </g>
        <g transform="rotate(-45 12 12)">
          <rect x="11" y="1" width="2" height="13" rx="1"/>
          <rect x="8" y="13" width="8" height="2" rx="1"/>
          <rect x="10.5" y="15" width="3" height="7" rx="1"/>
        </g>
      </svg>
      <svg id="diceIcon" class="icon-hidden" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle class="pip" cx="8" cy="8" r="1.6"/>
        <circle class="pip" cx="16" cy="8" r="1.6"/>
        <circle class="pip" cx="12" cy="12" r="1.6"/>
        <circle class="pip" cx="8" cy="16" r="1.6"/>
        <circle class="pip" cx="16" cy="16" r="1.6"/>
      </svg>
      <svg id="checkIcon" class="icon-hidden" viewBox="0 0 24 24">
        <path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/>
      </svg>
      <span id="battleLabel" class="icon-label">Battle</span>
    </button>

    <button id="victoryBtn" class="icon-btn" type="button" aria-label="Victory Theme">
      <svg viewBox="0 0 24 24">
        <path d="M5 4h14v2.5c0 2.5-1.6 4.5-4 5.2V15h1.5a1.5 1.5 0 0 1 1.5 1.5V17H10.4V16.5A1.5 1.5 0 0 1 11.9 15H12v-3.3c-2.4-.7-4-2.7-4-5.2V4Zm-3 1h2v1.5c0 1.1.4 2.1 1.1 2.9C4.4 8.9 4 7.9 4 6.9V6H2V5Zm18 0h2v1h-2v.9c0 1-.4 2-1.1 2.4.7-.8 1.1-1.8 1.1-2.9V5Z"/>
      </svg>
      <span class="icon-label">Victory</span>
    </button>
  </section>
</main>

<audio id="player" preload="auto"></audio>

<script src="app.js"></script>
</body>
</html>
